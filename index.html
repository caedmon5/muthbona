<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grendles Muðbona</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: Georgia, 'Times New Roman', serif;
  color: #d4a017;
  overflow: hidden;
}
#gameContainer {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#hud {
  display: flex;
  justify-content: space-between;
  width: 100%;
  padding: 8px 16px;
  font-size: 18px;
  letter-spacing: 1px;
  text-shadow: 0 0 8px rgba(212,160,23,0.5);
}
#hud span { min-width: 120px; }
#hudLeft { text-align: left; }
#hudCenter { text-align: center; }
#hudRight { text-align: right; }
canvas {
  display: block;
  border: 2px solid #3a2a0a;
  box-shadow: 0 0 30px rgba(20,80,20,0.3), inset 0 0 30px rgba(0,0,0,0.5);
}
#messageBar {
  width: 100%;
  text-align: center;
  padding: 8px;
  font-size: 16px;
  font-style: italic;
  color: #8a7a3a;
  min-height: 32px;
  text-shadow: 0 0 6px rgba(138,122,58,0.4);
}
</style>
</head>
<body>
<div id="gameContainer">
  <div id="hud">
    <span id="hudLeft">W&#230;lfyll: 0</span>
    <span id="hudCenter">Fitt: 1</span>
    <span id="hudRight">L&#299;f: 3</span>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="messageBar"></div>
</div>
<script>
(function() {
"use strict";

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hudLeft = document.getElementById('hudLeft');
const hudCenter = document.getElementById('hudCenter');
const hudRight = document.getElementById('hudRight');
const messageBar = document.getElementById('messageBar');

// --- Constants ---
const TILE = 20;
const COLS = 28;
const ROWS = 31;
const W = COLS * TILE;
const H = ROWS * TILE;
canvas.width = W;
canvas.height = H;

// Responsive scaling
function scaleCanvas() {
  const maxH = window.innerHeight - 80;
  const maxW = window.innerWidth - 20;
  const scale = Math.min(maxW / W, maxH / H, 2);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

// --- Audio ---
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(freq, dur, type, vol) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.value = vol || 0.08;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function sndEat() { playSound(440, 0.08, 'square', 0.06); setTimeout(()=>playSound(520, 0.06, 'square', 0.04), 30); }
function sndSpecialEat() { playSound(330, 0.15, 'sawtooth', 0.09); setTimeout(()=>playSound(440, 0.15, 'triangle', 0.08), 80); setTimeout(()=>playSound(550, 0.2, 'triangle', 0.07), 160); }
function sndPowerUp() { playSound(200, 0.3, 'sawtooth', 0.08); setTimeout(()=>playSound(300, 0.3, 'triangle', 0.06), 100); setTimeout(()=>playSound(400, 0.4, 'triangle', 0.07), 200); }
function sndDeath() { for(let i=0;i<5;i++) setTimeout(()=>playSound(300-i*40,0.15,'sawtooth',0.07), i*100); }
function sndLevelComplete() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSound(f,0.25,'triangle',0.08),i*150)); }
function sndEatGhost() { playSound(600, 0.15, 'square', 0.07); setTimeout(()=>playSound(800, 0.12, 'square', 0.05), 60); }
function sndCoinFlip() { playSound(500, 0.1, 'triangle', 0.06); setTimeout(()=>playSound(500, 0.1, 'triangle', 0.06), 120); }

// --- Maze definition ---
// 0=path, 1=wall, 2=dot, 3=power pellet (glof), 4=ghost house door, 5=empty path, 6=special victim (Handscio/Æschere)
const MAZE_TEMPLATE = [
  "1111111111111111111111111111",
  "1222222222222112222222222221",
  "1211211211212112121121121121",
  "1311211211212112121121121131",
  "1222222222222222222222222221",
  "1211211112111111121112112121",
  "1222211222222112222221122221",
  "1211211112112112112111122121",
  "1222222222112112112222222221",
  "1112112112112112112112112111",
  "1222112222200000022221122221",
  "5550112112111441112112110555",
  "1111112112100000012112111111",
  "0000022222100000012222200000",
  "1111112112100000012112111111",
  "5550112112111111112112110555",
  "1222112222200000022221122221",
  "1112112112112112112112112111",
  "1222222222112112112222222221",
  "1211211112112112112111121121",
  "1622211222222002222221126221",
  "1212211112112112112111121121",
  "1222222222222222222222222221",
  "1211211211212112121121121121",
  "1211211211212112121121121121",
  "1222222222222222222222222221",
  "1211112111212112121112111121",
  "1211112111212112121112111121",
  "1222222222222222222222222221",
  "1222222222222222222222222221",
  "1111111111111111111111111111",
];

const SPECIAL_VICTIMS = {
  '1,20':  { name: 'Hondsc\u012Bo', phrase: 'Hondsc\u012Bo forswealg!', points: 200 },
  '24,20': { name: '\u00C6schere',  phrase: '\u00C6schere \u00E6t!',     points: 200 },
};

let maze = [];
function loadMaze() {
  maze = [];
  for (let r = 0; r < ROWS; r++) {
    maze[r] = [];
    for (let c = 0; c < COLS; c++) {
      maze[r][c] = parseInt(MAZE_TEMPLATE[r][c]);
    }
  }
}

function countDots() {
  let n = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (maze[r][c] === 2 || maze[r][c] === 3 || maze[r][c] === 6) n++;
  return n;
}

// --- OE phrases ---
const eatPhrases = [
  "sl\u01E3pende rinc", "b\u0101nh\u016Bs gebr\u00E6c", "synsn\u01E3dum swealh",
  "f\u0113t ond folma", "bl\u014Dd \u0113drum dranc", "l\u012Bc eall forswealg",
  "gryre l\u0113oda", "d\u0113a\u00F0scua", "w\u00E6l r\u0113ahte",
  "heoro dr\u0113orig", "g\u016B\u00F0rinc monig"
];
let phraseIndex = 0;
function nextPhrase() {
  const p = eatPhrases[phraseIndex % eatPhrases.length];
  phraseIndex++;
  return p;
}

// --- Game State ---
const STATE_TITLE = 0, STATE_INTRO = 1, STATE_PLAY = 2, STATE_DYING = 3,
      STATE_LEVEL_COMPLETE = 4, STATE_GAMEOVER = 5, STATE_PAUSED = 6,
      STATE_READY = 7;
let state = STATE_TITLE;
let score = 0, lives = 3, level = 1, dotsLeft = 0;
let highScore = parseInt(localStorage.getItem('grendelHigh') || '0');
let msgTimer = 0, msgText = '';
let stateTimer = 0;
let frightenTimer = 0;
const FRIGHTEN_DURATION = 360;
let coinFlipResult = null;
let coinFlipTimer = 0;

// --- Entities ---
const DX = [1, 0, -1, 0];
const DY = [0, 1, 0, -1];

const GRENDEL_START_COL = 13;
const GRENDEL_START_ROW = 20;
const GHOST_HOUSE_EXIT_COL = 13;
const GHOST_HOUSE_EXIT_ROW = 10;

function Entity(startCol, startRow, speed) {
  this.startCol = startCol;
  this.startRow = startRow;
  this.col = startCol;
  this.row = startRow;
  this.x = startCol * TILE + TILE / 2;
  this.y = startRow * TILE + TILE / 2;
  this.dir = 2;
  this.nextDir = -1;
  this.speed = speed;
  this.moving = false;
  this.animFrame = 0;
}

Entity.prototype.reset = function() {
  this.col = this.startCol;
  this.row = this.startRow;
  this.x = this.startCol * TILE + TILE / 2;
  this.y = this.startRow * TILE + TILE / 2;
  this.dir = 2;
  this.nextDir = -1;
  this.moving = false;
};

function isWalkable(t) {
  return t === 0 || t === 2 || t === 3 || t === 5 || t === 6;
}

function canMove(col, row, dir) {
  let nc = col + DX[dir];
  let nr = row + DY[dir];
  if (nc < 0) nc = COLS - 1;
  if (nc >= COLS) nc = 0;
  if (nr < 0 || nr >= ROWS) return false;
  return isWalkable(maze[nr][nc]);
}

function canMoveGhost(col, row, dir, canUseDoor) {
  let nc = col + DX[dir];
  let nr = row + DY[dir];
  if (nc < 0) nc = COLS - 1;
  if (nc >= COLS) nc = 0;
  if (nr < 0 || nr >= ROWS) return false;
  const t = maze[nr][nc];
  if (t === 1) return false;
  if (t === 4 && !canUseDoor) return false;
  return true;
}

let grendel = new Entity(GRENDEL_START_COL, GRENDEL_START_ROW, 1.6);

function Ghost(name, col, row, color, scatterCol, scatterRow, baseSpeed) {
  Entity.call(this, col, row, baseSpeed || 1.8);
  this.name = name;
  this.color = color;
  this.scatterCol = scatterCol;
  this.scatterRow = scatterRow;
  this.baseSpeed = baseSpeed || 1.8;
  this.mode = 'scatter';
  this.inHouse = true;
  this.houseTimer = 0;
  this.eaten = false;
  this.frightened = false;
}
Ghost.prototype = Object.create(Entity.prototype);

Ghost.prototype.reset = function() {
  Entity.prototype.reset.call(this);
  this.dir = 2;
  this.nextDir = 2;
  this.mode = 'scatter';
  this.inHouse = true;
  this.houseTimer = 0;
  this.eaten = false;
  this.frightened = false;
};

let ghosts = [];
function createGhosts() {
  ghosts = [
    new Ghost('B\u0113owulf',  13, 13, '#4488ff', 25, 0, 1.8),
    new Ghost('Wulfg\u0101r',  14, 13, '#ff4444', 2, 0, 1.8),
    new Ghost('Unfer\u00F0',   12, 13, '#ff88cc', 25, 29, 1.8),
    new Ghost('Hr\u014D\u00F0g\u0101r', 15, 13, '#aaaaaa', 2, 29, 1.1),
  ];
  ghosts.forEach(g => { g.nextDir = 2; });
}

const HOUSE_RELEASE = [1, 150, 300, 450];
const MODE_TIMES = [420, 1200, 420, 1200, 300, 1200, 300, 99999];
let modeIndex = 0, modeTimer = 0;

function getGlobalMode() {
  return (modeIndex % 2 === 0) ? 'scatter' : 'chase';
}

// --- Movement ---
function moveEntity(e, isGhost, canUseDoor) {
  const cx = e.col * TILE + TILE / 2;
  const cy = e.row * TILE + TILE / 2;
  const tolerance = e.speed * 0.9;
  const atCenter = Math.abs(e.x - cx) < tolerance && Math.abs(e.y - cy) < tolerance;

  if (atCenter) {
    e.x = cx;
    e.y = cy;

    const checkFn = isGhost ? ((c,r,d) => canMoveGhost(c,r,d,canUseDoor)) : canMove;

    if (!isGhost && e.nextDir === -1) {
      e.moving = false;
      return;
    }

    if (e.nextDir !== -1 && e.nextDir !== e.dir && checkFn(e.col, e.row, e.nextDir)) {
      e.dir = e.nextDir;
    }
    if (checkFn(e.col, e.row, e.dir)) {
      e.moving = true;
    } else {
      e.moving = false;
      return;
    }
  }

  if (e.moving) {
    e.x += DX[e.dir] * e.speed;
    e.y += DY[e.dir] * e.speed;

    e.col = Math.round((e.x - TILE / 2) / TILE);
    e.row = Math.round((e.y - TILE / 2) / TILE);

    if (e.x < -TILE / 2) { e.x += W + TILE; e.col = COLS - 1; }
    if (e.x > W + TILE / 2) { e.x -= W + TILE; e.col = 0; }
    if (e.col < 0) e.col = 0;
    if (e.col >= COLS) e.col = COLS - 1;
  }

  e.animFrame++;
}

// --- Ghost AI ---
function distSq(c1, r1, c2, r2) {
  return (c1-c2)*(c1-c2) + (r1-r2)*(r1-r2);
}

function chooseGhostDir(ghost) {
  if (ghost.inHouse) return;

  const cx = ghost.col * TILE + TILE / 2;
  const cy = ghost.row * TILE + TILE / 2;
  if (Math.abs(ghost.x - cx) > 1.5 || Math.abs(ghost.y - cy) > 1.5) return;

  let targetCol, targetRow;

  if (ghost.eaten) {
    targetCol = GHOST_HOUSE_EXIT_COL;
    targetRow = GHOST_HOUSE_EXIT_ROW;
    if (Math.abs(ghost.col - GHOST_HOUSE_EXIT_COL) <= 1 && Math.abs(ghost.row - GHOST_HOUSE_EXIT_ROW) <= 1) {
      ghost.eaten = false;
      ghost.frightened = false;
      ghost.inHouse = true;
      ghost.houseTimer = 0;
      ghost.col = ghost.startCol;
      ghost.row = ghost.startRow;
      ghost.x = ghost.col * TILE + TILE / 2;
      ghost.y = ghost.row * TILE + TILE / 2;
      ghost.speed = getLevelGhostSpeed(ghost);
      return;
    }
  } else if (ghost.frightened) {
    const dirs = [0,1,2,3].filter(d => canMoveGhost(ghost.col, ghost.row, d, false) && d !== (ghost.dir + 2) % 4);
    if (dirs.length > 0) ghost.nextDir = dirs[Math.floor(Math.random() * dirs.length)];
    return;
  } else if (ghost.name === 'Hr\u014D\u00F0g\u0101r') {
    targetCol = grendel.col < COLS / 2 ? COLS - 2 : 1;
    targetRow = grendel.row < ROWS / 2 ? ROWS - 2 : 1;
  } else if (getGlobalMode() === 'scatter') {
    targetCol = ghost.scatterCol;
    targetRow = ghost.scatterRow;
  } else {
    if (ghost.name === 'B\u0113owulf') {
      targetCol = grendel.col;
      targetRow = grendel.row;
    } else if (ghost.name === 'Wulfg\u0101r') {
      targetCol = grendel.col + DX[grendel.dir] * 4;
      targetRow = grendel.row + DY[grendel.dir] * 4;
    } else if (ghost.name === 'Unfer\u00F0') {
      const beo = ghosts[0];
      const aheadCol = grendel.col + DX[grendel.dir] * 2;
      const aheadRow = grendel.row + DY[grendel.dir] * 2;
      targetCol = aheadCol + (aheadCol - beo.col);
      targetRow = aheadRow + (aheadRow - beo.row);
    } else {
      targetCol = ghost.scatterCol;
      targetRow = ghost.scatterRow;
    }
  }

  let bestDir = ghost.dir;
  let bestDist = Infinity;
  const priority = [3, 2, 1, 0];
  for (let i = 0; i < 4; i++) {
    const d = priority[i];
    if (d === (ghost.dir + 2) % 4) continue;
    if (!canMoveGhost(ghost.col, ghost.row, d, ghost.eaten)) continue;
    let nc = ghost.col + DX[d];
    let nr = ghost.row + DY[d];
    if (nc < 0) nc = COLS - 1;
    if (nc >= COLS) nc = 0;
    const dist = distSq(nc, nr, targetCol, targetRow);
    if (dist < bestDist) { bestDist = dist; bestDir = d; }
  }
  ghost.nextDir = bestDir;
}

function getLevelGhostSpeed(ghost) {
  if (ghost && ghost.name === 'Hr\u014D\u00F0g\u0101r') {
    return Math.min(1.1 + (level - 1) * 0.1, 1.6);
  }
  return Math.min(1.8 + (level - 1) * 0.2, 2.8);
}
function getLevelGrendelSpeed() { return Math.min(1.6 + (level - 1) * 0.1, 2.4); }
function getLevelFrightenDuration() { return Math.max(FRIGHTEN_DURATION - (level - 1) * 60, 120); }

function updateGhostHouse(ghost, index) {
  if (!ghost.inHouse) return;
  ghost.houseTimer++;
  const releaseTime = HOUSE_RELEASE[index] / Math.max(1, level * 0.7);
  if (ghost.houseTimer >= releaseTime) {
    ghost.inHouse = false;
    ghost.col = GHOST_HOUSE_EXIT_COL;
    ghost.row = GHOST_HOUSE_EXIT_ROW;
    ghost.x = ghost.col * TILE + TILE / 2;
    ghost.y = ghost.row * TILE + TILE / 2;
    ghost.dir = 2;
    ghost.nextDir = 2;
    ghost.speed = getLevelGhostSpeed(ghost);
    ghost.eaten = false;
    ghost.frightened = false;
  } else {
    const cy2 = ghost.startRow * TILE + TILE / 2;
    ghost.y = cy2 + Math.sin(ghost.houseTimer * 0.1) * 4;
    ghost.x = ghost.startCol * TILE + TILE / 2;
  }
}

// --- Input ---
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  ensureAudio();

  if (state === STATE_TITLE) {
    if (e.key === 'Enter' || e.key === ' ') { state = STATE_INTRO; stateTimer = 0; }
  } else if (state === STATE_INTRO) {
    if (e.key === 'Enter' || e.key === ' ') { startGame(); }
  } else if (state === STATE_GAMEOVER) {
    if (stateTimer > 60 && (e.key === 'Enter' || e.key === ' ')) { state = STATE_TITLE; stateTimer = 0; }
  } else if (state === STATE_READY) {
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { grendel.nextDir = 0; state = STATE_PLAY; }
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { grendel.nextDir = 1; state = STATE_PLAY; }
    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { grendel.nextDir = 2; state = STATE_PLAY; }
    else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { grendel.nextDir = 3; state = STATE_PLAY; }
    else if (e.key === 'Enter' || e.key === ' ') { state = STATE_PLAY; }
  } else if (state === STATE_PLAY) {
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') grendel.nextDir = 0;
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') grendel.nextDir = 1;
    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') grendel.nextDir = 2;
    else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') grendel.nextDir = 3;
    else if (e.key === 'p' || e.key === 'P') state = STATE_PAUSED;
  } else if (state === STATE_PAUSED) {
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') state = STATE_PLAY;
  }
});

// --- Game flow ---
function startGame() {
  score = 0; lives = 3; level = 1;
  phraseIndex = 0;
  startLevel();
}

function startLevel() {
  loadMaze();
  dotsLeft = countDots();
  modeIndex = 0; modeTimer = 0;
  frightenTimer = 0;
  coinFlipResult = null;
  coinFlipTimer = 0;

  grendel = new Entity(GRENDEL_START_COL, GRENDEL_START_ROW, getLevelGrendelSpeed());
  grendel.dir = 2; grendel.nextDir = -1;

  createGhosts();
  state = STATE_READY;
  stateTimer = 0;
  setMessage("Fitt " + level + " \u2014 Grendel com\u00F0 t\u014D Heorote!");
}

function resetPositions() {
  grendel.col = GRENDEL_START_COL;
  grendel.row = GRENDEL_START_ROW;
  grendel.x = grendel.col * TILE + TILE / 2;
  grendel.y = grendel.row * TILE + TILE / 2;
  grendel.dir = 2; grendel.nextDir = -1;
  grendel.speed = getLevelGrendelSpeed();
  grendel.moving = false;

  createGhosts();
  frightenTimer = 0;
  modeIndex = 0; modeTimer = 0;
  coinFlipResult = null;
  coinFlipTimer = 0;
}

function setMessage(txt) { msgText = txt; msgTimer = 180; }

// --- Collision ---
let ghostEatCombo = 0;

function checkCollisions() {
  const gc = grendel.col;
  const gr = grendel.row;

  if (gc >= 0 && gc < COLS && gr >= 0 && gr < ROWS) {
    const t = maze[gr][gc];
    if (t === 2) {
      maze[gr][gc] = 0;
      score += 10;
      dotsLeft--;
      sndEat();
      if (Math.random() < 0.35) setMessage(nextPhrase());
    } else if (t === 6) {
      maze[gr][gc] = 0;
      dotsLeft--;
      const key = gc + ',' + gr;
      const victim = SPECIAL_VICTIMS[key];
      if (victim) {
        score += victim.points;
        sndSpecialEat();
        setMessage(victim.phrase);
      } else {
        score += 200;
        sndSpecialEat();
        setMessage("synsn\u01E3dum swealh!");
      }
    } else if (t === 3) {
      maze[gr][gc] = 0;
      score += 50;
      dotsLeft--;
      sndPowerUp();
      frightenTimer = getLevelFrightenDuration();
      ghostEatCombo = 0;
      setMessage("Grendel his gl\u014Df genam!");
      ghosts.forEach(g => {
        if (!g.inHouse && !g.eaten) {
          if (g.name === 'B\u0113owulf') return;
          g.frightened = true;
          g.dir = (g.dir + 2) % 4;
          g.speed = 1.0;
        }
      });
    }
  }

  if (dotsLeft <= 0) {
    state = STATE_LEVEL_COMPLETE;
    stateTimer = 0;
    sndLevelComplete();
    setMessage("Heorot is \u0101fylled!");
    return;
  }

  for (let i = 0; i < ghosts.length; i++) {
    const g = ghosts[i];
    if (g.inHouse || g.eaten) continue;
    const dx = Math.abs(grendel.x - g.x);
    const dy = Math.abs(grendel.y - g.y);
    if (dx < TILE * 0.65 && dy < TILE * 0.65) {

      // BEOWULF: ALWAYS LETHAL
      if (g.name === 'B\u0113owulf') {
        state = STATE_DYING;
        stateTimer = 0;
        sndDeath();
        setMessage("B\u0113owulf gr\u0101p Grendel! \u2014 The hero seizes you!");
        return;
      }

      // UNFERTH: 50/50
      if (g.name === 'Unfer\u00F0' && !g.frightened) {
        sndCoinFlip();
        if (Math.random() < 0.5) {
          g.eaten = true;
          g.frightened = false;
          g.speed = 3.5;
          score += 300;
          sndEatGhost();
          setMessage("Unfer\u00F0 ofercumen! \u2014 Unferth overcome!");
          coinFlipResult = 'win';
          coinFlipTimer = 90;
        } else {
          state = STATE_DYING;
          stateTimer = 0;
          sndDeath();
          setMessage("Unfer\u00F0 wi\u00F0st\u014Dd! \u2014 Unferth withstood!");
          coinFlipResult = 'lose';
          coinFlipTimer = 90;
          return;
        }
        continue;
      }

      // HROTHGAR: always catchable
      if (g.frightened || g.name === 'Hr\u014D\u00F0g\u0101r') {
        if (g.name === 'Hr\u014D\u00F0g\u0101r' && !g.frightened) {
          g.eaten = true;
          g.speed = 3.5;
          score += 500;
          sndEatGhost();
          setMessage("Hr\u014D\u00F0g\u0101r genumen! \u2014 The old king taken!");
        } else {
          g.eaten = true;
          g.frightened = false;
          g.speed = 3.5;
          ghostEatCombo++;
          const pts = (g.name === 'Hr\u014D\u00F0g\u0101r') ? 500 : 200 * Math.pow(2, ghostEatCombo - 1);
          score += pts;
          sndEatGhost();
          setMessage(g.name + " \u2014 " + pts);
        }
      } else {
        state = STATE_DYING;
        stateTimer = 0;
        sndDeath();
        return;
      }
    }
  }
}

// --- Update ---
function update() {
  stateTimer++;

  if (coinFlipTimer > 0) coinFlipTimer--;

  if (state === STATE_READY) {
    ghosts.forEach((g, i) => updateGhostHouse(g, i));
    if (msgTimer > 0) msgTimer--;
    return;
  }

  if (state === STATE_PLAY) {
    moveEntity(grendel, false, false);

    modeTimer++;
    if (modeIndex < MODE_TIMES.length && modeTimer >= MODE_TIMES[modeIndex]) {
      modeTimer = 0;
      modeIndex++;
      ghosts.forEach(g => {
        if (!g.inHouse && !g.frightened && !g.eaten) {
          g.dir = (g.dir + 2) % 4;
          g.nextDir = g.dir;
        }
      });
    }

    if (frightenTimer > 0) {
      frightenTimer--;
      if (frightenTimer <= 0) {
        ghosts.forEach(g => {
          if (g.frightened) {
            g.frightened = false;
            g.speed = getLevelGhostSpeed(g);
          }
        });
      }
    }

    ghosts.forEach((g, i) => {
      updateGhostHouse(g, i);
      if (!g.inHouse) {
        chooseGhostDir(g);
        moveEntity(g, true, g.eaten);
      }
    });

    checkCollisions();
    if (msgTimer > 0) msgTimer--;

  } else if (state === STATE_DYING) {
    if (stateTimer >= 90) {
      lives--;
      if (lives <= 0) {
        state = STATE_GAMEOVER;
        stateTimer = 0;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('grendelHigh', highScore.toString());
        }
        setMessage("B\u0113owulf h\u00E6fde Grendles hand!");
      } else {
        resetPositions();
        state = STATE_READY;
        stateTimer = 0;
        setMessage("L\u012Bf: " + lives);
      }
    }
  } else if (state === STATE_LEVEL_COMPLETE) {
    if (stateTimer >= 180) {
      level++;
      startLevel();
    }
  } else if (state === STATE_GAMEOVER) {
    if (msgTimer > 0) msgTimer--;
  }
}

// --- Drawing ---
const wallPattern = (function() {
  const c = document.createElement('canvas');
  c.width = TILE; c.height = TILE;
  const cx = c.getContext('2d');
  cx.fillStyle = '#2a1a08';
  cx.fillRect(0, 0, TILE, TILE);
  cx.strokeStyle = '#3a2810';
  cx.lineWidth = 0.5;
  for (let i = 0; i < 4; i++) {
    cx.beginPath();
    cx.moveTo(0, i * TILE / 3 + 2);
    cx.lineTo(TILE, i * TILE / 3 + 2);
    cx.stroke();
  }
  cx.strokeStyle = '#4a3a18';
  cx.lineWidth = 1;
  cx.strokeRect(0.5, 0.5, TILE - 1, TILE - 1);
  return ctx.createPattern(c, 'repeat');
})();

function drawMaze(frame) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * TILE;
      const y = r * TILE;
      const t = maze[r][c];
      if (t === 1) {
        ctx.fillStyle = wallPattern;
        ctx.fillRect(x, y, TILE, TILE);
      } else if (t === 2) {
        ctx.fillStyle = '#d4a017';
        ctx.shadowBlur = 3;
        ctx.shadowColor = '#d4a017';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      } else if (t === 6) {
        const pulse = 0.7 + 0.3 * Math.sin(frame * 0.05);
        const cx2 = x + TILE / 2;
        const cy2 = y + TILE / 2;
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(255, 180, 40, 0.6)';
        ctx.fillStyle = 'rgba(255, 180, 40, ' + pulse + ')';
        ctx.beginPath();
        ctx.ellipse(cx2, cy2, 7, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx2 - 5, cy2 - 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        const key = c + ',' + r;
        const victim = SPECIAL_VICTIMS[key];
        if (victim) {
          ctx.fillStyle = 'rgba(255, 200, 80, ' + (pulse * 0.7) + ')';
          ctx.font = '8px Georgia';
          ctx.textAlign = 'center';
          ctx.fillText(victim.name, cx2, cy2 + 14);
        }
      } else if (t === 3) {
        const pulse = 0.6 + 0.4 * Math.sin(frame * 0.06);
        ctx.fillStyle = 'rgba(100, 255, 100, ' + pulse + ')';
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#66ff66';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(200, 255, 200, ' + (pulse * 0.6) + ')';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, 3, 0, Math.PI * 2);
        ctx.fill();
      } else if (t === 4) {
        ctx.fillStyle = '#997722';
        ctx.fillRect(x + 2, y + TILE / 2 - 2, TILE - 4, 4);
      }
    }
  }

  const hcx = 14 * TILE;
  const hcy = 13 * TILE;
  const grad = ctx.createRadialGradient(hcx, hcy, 5, hcx, hcy, TILE * 4);
  grad.addColorStop(0, 'rgba(200, 120, 20, 0.04)');
  grad.addColorStop(1, 'rgba(200, 120, 20, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(hcx - TILE * 4, hcy - TILE * 4, TILE * 8, TILE * 8);
}

function drawGrendel(frame) {
  const x = grendel.x;
  const y = grendel.y;
  const r = TILE * 0.45;

  const mouthOpen = grendel.moving ? (0.15 + 0.2 * Math.abs(Math.sin(frame * 0.25))) : 0.05;
  const angles = [0, Math.PI / 2, Math.PI, -Math.PI / 2];
  const baseAngle = angles[grendel.dir];

  ctx.fillStyle = 'rgba(0, 80, 0, 0.4)';
  ctx.shadowBlur = 25;
  ctx.shadowColor = 'rgba(0, 120, 0, 0.5)';
  ctx.beginPath();
  ctx.arc(x, y, r + 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#1a4a1a';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.arc(x, y, r, baseAngle + mouthOpen, baseAngle + Math.PI * 2 - mouthOpen);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(0, 30, 0, 0.4)';
  ctx.beginPath();
  ctx.arc(x - 2, y + 1, r * 0.5, 0, Math.PI * 2);
  ctx.fill();

  if (mouthOpen > 0.08) {
    ctx.fillStyle = '#5a0000';
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, r * 0.75, baseAngle - mouthOpen, baseAngle + mouthOpen);
    ctx.closePath();
    ctx.fill();
  }

  const eyeOffset = r * 0.3;
  const perpX = -Math.sin(baseAngle);
  const perpY = Math.cos(baseAngle);
  const fwdX = Math.cos(baseAngle);
  const fwdY = Math.sin(baseAngle);

  for (let side = -1; side <= 1; side += 2) {
    const ex = x + perpX * eyeOffset * side + fwdX * r * 0.2;
    const ey = y + perpY * eyeOffset * side + fwdY * r * 0.2;
    ctx.fillStyle = '#00ff00';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00ff00';
    ctx.beginPath();
    ctx.arc(ex, ey, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#88ff88';
    ctx.beginPath();
    ctx.arc(ex, ey, 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawGhost(ghost, frame) {
  const x = ghost.x;
  const y = ghost.y;
  const r = TILE * 0.42;

  if (ghost.eaten) {
    drawGhostEyes(x, y, r, ghost.dir);
    return;
  }

  const isHrothgar = (ghost.name === 'Hr\u014D\u00F0g\u0101r');

  let color = ghost.color;
  if (ghost.frightened) {
    const flash = frightenTimer < 120 && Math.floor(frame / 8) % 2;
    color = flash ? '#ffffff' : '#2222aa';
  }

  ctx.fillStyle = color;
  ctx.shadowBlur = 5;
  ctx.shadowColor = color;
  ctx.beginPath();
  ctx.arc(x, y - 2, r, Math.PI, 0);
  ctx.lineTo(x + r, y + r - 2);
  const wave = Math.sin(frame * 0.15) * 2;
  const segs = 3;
  const segW = (r * 2) / segs;
  for (let i = 0; i < segs; i++) {
    const sx = x + r - i * segW;
    const sy = y + r - 2 + ((i % 2 === 0) ? wave : -wave);
    const ex2 = x + r - (i + 1) * segW;
    const ey2 = y + r - 2 + (((i + 1) % 2 === 0) ? wave : -wave);
    ctx.quadraticCurveTo(sx - segW * 0.5, (sy + ey2) / 2 + 3, ex2, ey2);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  if (isHrothgar && !ghost.frightened) {
    // White beard
    ctx.strokeStyle = '#cccccc';
    ctx.lineWidth = 1;
    for (let i = -3; i <= 3; i += 1.5) {
      const bx = x + i;
      ctx.beginPath();
      ctx.moveTo(bx, y + 2);
      ctx.quadraticCurveTo(bx + Math.sin(frame * 0.08 + i) * 1.5, y + 6, bx + Math.sin(frame * 0.05 + i) * 2, y + r + 2);
      ctx.stroke();
    }
    // Crown
    ctx.fillStyle = '#d4a017';
    ctx.beginPath();
    ctx.moveTo(x - 5, y - r + 1);
    ctx.lineTo(x - 5, y - r - 3);
    ctx.lineTo(x - 3, y - r);
    ctx.lineTo(x - 1, y - r - 4);
    ctx.lineTo(x + 1, y - r);
    ctx.lineTo(x + 3, y - r - 3);
    ctx.lineTo(x + 5, y - r - 4);
    ctx.lineTo(x + 5, y - r + 1);
    ctx.closePath();
    ctx.fill();
    // Sunken eyes
    ctx.fillStyle = '#444444';
    ctx.beginPath();
    ctx.ellipse(x - 3, y - 3, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 3, y - 3, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Dim pupils
    ctx.fillStyle = '#888888';
    const lx = DX[ghost.dir] * 1.5;
    const ly = DY[ghost.dir] * 1.5;
    ctx.beginPath();
    ctx.arc(x - 3 + lx, y - 3 + ly, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 3 + lx, y - 3 + ly, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Wrinkles
    ctx.strokeStyle = '#777777';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 6 - i * 1.5);
      ctx.lineTo(x + 4, y - 6 - i * 1.5);
      ctx.stroke();
    }
    // Stooped posture
    ctx.fillStyle = ghost.color;
    ctx.beginPath();
    ctx.ellipse(x + 2, y - 1, r * 0.3, r * 0.5, 0.15, 0, Math.PI * 2);
    ctx.fill();
  } else if (ghost.frightened) {
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(x - 3, y - 3, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 3, y - 3, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - 5, y + 3);
    for (let i = 1; i <= 5; i++) {
      ctx.lineTo(x - 5 + i * 2, y + 3 + ((i % 2) ? -2 : 0));
    }
    ctx.stroke();
  } else {
    drawGhostEyes(x, y, r, ghost.dir);
    if (ghost.name === 'B\u0113owulf') {
      ctx.fillStyle = 'rgba(100, 160, 255, 0.15)';
      ctx.beginPath();
      ctx.arc(x, y - 1, r * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#aaccff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x, y - r - 1);
      ctx.lineTo(x, y - 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - 3, y - r + 2);
      ctx.lineTo(x + 3, y - r + 2);
      ctx.stroke();
    }
  }
}

function drawGhostEyes(x, y, r, dir) {
  const lookX = DX[dir] * 2.5;
  const lookY = DY[dir] * 2.5;
  for (let side = -1; side <= 1; side += 2) {
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(x + side * 4, y - 3, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000088';
    ctx.beginPath();
    ctx.arc(x + side * 4 + lookX, y - 3 + lookY, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHUD() {
  hudLeft.textContent = 'W\u00E6lfyll: ' + score;
  hudCenter.textContent = 'Fitt: ' + level;
  let lifeStr = 'L\u012Bf: ';
  for (let i = 0; i < lives; i++) lifeStr += '\u2666 ';
  hudRight.textContent = lifeStr;
  messageBar.textContent = msgTimer > 0 ? msgText : '';
}

function drawCoinFlip(frame) {
  if (coinFlipTimer <= 0) return;
  const alpha = Math.min(coinFlipTimer / 30, 1);
  const cx2 = grendel.x;
  const cy2 = grendel.y - 25;
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 14px Georgia';
  ctx.textAlign = 'center';
  if (coinFlipResult === 'win') {
    ctx.fillStyle = '#00ff66';
    ctx.fillText('\u2694 Won!', cx2, cy2);
  } else {
    ctx.fillStyle = '#ff4444';
    ctx.fillText('\u2620 Lost!', cx2, cy2);
  }
  ctx.globalAlpha = 1.0;
}

  ctx.font = '12px Georgia';
  ctx.fillText('Use Arrow Keys or WASD to move \u2022 P to pause', W/2, H * 0.89);

  if (Math.floor(frame / 35) % 2) {
    ctx.fillStyle = '#d4a017';
    ctx.font = '18px Georgia';
    ctx.fillText('Press ENTER to play', W/2, H * 0.96);
  }
}

function drawReadyScreen(frame) {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#d4a017';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#d4a017';
  ctx.font = 'bold 24px Georgia';
  ctx.fillText('GEARO!', W/2, H/2 - 20);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#8a7a3a';
  ctx.font = '14px Georgia';
  ctx.fillText('Press any direction key to move', W/2, H/2 + 5);
  ctx.fillStyle = '#555';
  ctx.font = '20px Georgia';
  ctx.fillText('\u2190 \u2191 \u2193 \u2192', W/2, H/2 + 30);
  ctx.font = '11px Georgia';
  ctx.fillText('or W A S D', W/2, H/2 + 45);
}

function drawGameOver(frame) {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#aa0000';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#aa0000';
  ctx.font = 'bold 32px Georgia';
  ctx.fillText('GAME OVER', W/2, H * 0.25);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#d4a017';
  ctx.font = 'italic 17px Georgia';
  ctx.fillText('B\u0113owulf h\u00E6fde Grendles hand!', W/2, H * 0.35);

  ctx.fillStyle = '#888';
  ctx.font = '13px Georgia';
  ctx.fillText('"Beowulf had Grendel\'s hand \u2014', W/2, H * 0.42);
  ctx.fillText('he tore the arm from the shoulder-joint..."', W/2, H * 0.46);

  ctx.fillStyle = '#d4a017';
  ctx.font = '22px Georgia';
  ctx.fillText('W\u00E6lfyll: ' + score, W/2, H * 0.58);

  ctx.fillStyle = '#8a7a3a';
  ctx.font = '14px Georgia';
  ctx.fillText('Fitt reached: ' + level, W/2, H * 0.64);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ffcc00';
    ctx.font = 'bold 16px Georgia';
    ctx.fillText('New High Score!', W/2, H * 0.70);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = '#666';
    ctx.font = '14px Georgia';
    ctx.fillText('High Score: ' + highScore, W/2, H * 0.70);
  }

  if (stateTimer > 60 && Math.floor(frame / 35) % 2) {
    ctx.fillStyle = '#888';
    ctx.font = '16px Georgia';
    ctx.fillText('Press ENTER to continue', W/2, H * 0.85);
  }
}

function drawDyingAnimation() {
  const t = Math.min(stateTimer / 80, 1);
  const x = grendel.x;
  const y = grendel.y;
  const r = TILE * 0.45 * (1 - t);

  if (r > 0.5) {
    ctx.fillStyle = 'rgba(26, 74, 26, ' + (1 - t) + ')';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(180, 0, 0, ' + (0.4 * Math.sin(t * Math.PI)) + ')';
    ctx.beginPath();
    ctx.arc(x, y, r + 10 * t, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPaused() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#d4a017';
  ctx.font = 'bold 28px Georgia';
  ctx.fillText('PAUSED', W/2, H/2 - 5);
  ctx.fillStyle = '#8a7a3a';
  ctx.font = '15px Georgia';
  ctx.fillText('Press P to resume', W/2, H/2 + 25);
}

// --- Main loop ---
let frameCount = 0;
function gameLoop() {
  frameCount++;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  switch (state) {
    case STATE_TITLE:
      drawTitleScreen(frameCount);
      break;
    case STATE_INTRO:
      drawIntroScreen(frameCount);
      break;
    case STATE_READY:
      update();
      drawMaze(frameCount);
      drawGrendel(frameCount);
      ghosts.forEach(g => drawGhost(g, frameCount));
      drawHUD();
      drawReadyScreen(frameCount);
      break;
    case STATE_PLAY:
      update();
      drawMaze(frameCount);
      drawGrendel(frameCount);
      ghosts.forEach(g => drawGhost(g, frameCount));
      drawCoinFlip(frameCount);
      drawHUD();
      break;
    case STATE_DYING:
      update();
      drawMaze(frameCount);
      drawDyingAnimation();
      ghosts.forEach(g => drawGhost(g, frameCount));
      drawHUD();
      break;
    case STATE_LEVEL_COMPLETE:
      update();
      drawMaze(frameCount);
      drawGrendel(frameCount);
      ghosts.forEach(g => drawGhost(g, frameCount));
      drawHUD();
      if (Math.floor(frameCount / 12) % 2) {
        ctx.fillStyle = 'rgba(212, 160, 23, 0.06)';
        ctx.fillRect(0, 0, W, H);
      }
      break;
    case STATE_GAMEOVER:
      update();
      drawMaze(frameCount);
      drawGameOver(frameCount);
      break;
    case STATE_PAUSED:
      drawMaze(frameCount);
      drawGrendel(frameCount);
      ghosts.forEach(g => drawGhost(g, frameCount));
      drawHUD();
      drawPaused();
      break;
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
